<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vizu.pro - Editor Mobile</title>
    <style>
        :root { 
            --accent-red: #ff4500; 
            --gray-border: #333; 
            --sidebar-closed: 40px; 
            --sidebar-open: 85%; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #050505; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Barra Lateral de Edição */
        .sidebar-container { 
            width: var(--sidebar-closed); 
            background: #000; 
            border-right: 1px solid var(--accent-red); 
            display: flex; 
            transition: width 0.4s; 
            position: relative; 
            z-index: 100; 
        }
        
        .sidebar-container.is-open { width: var(--sidebar-open); }
        
        .editor-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            opacity: 0; 
            transition: opacity 0.3s; 
            pointer-events: none; 
        }
        
        .is-open .editor-wrapper { opacity: 1; pointer-events: auto; }
        
        textarea { 
            flex: 1; 
            border: none; 
            padding: 20px; 
            font-family: 'Consolas', monospace; 
            font-size: 13px; 
            background: transparent; 
            color: #ff4d4d; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none; 
            resize: none; 
        }

        .toggle-tab { 
            width: 40px; 
            height: 100%; 
            background: #0a0a0a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            color: var(--accent-red); 
            font-weight: bold; 
            border-left: 1px solid #222; 
        }
        
        /* Área Principal */
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        header { 
            background: #000; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent-red); 
        }
        
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--accent-red); }
        
        /* LED de Memória */
        .led-mem { 
            width: 25px; 
            height: 25px; 
            border-radius: 50%; 
            background: #00ff00; 
            border: 2px solid #004400; 
            cursor: pointer; 
            box-shadow: 0 0 10px #00ff00; 
            animation: pulse-led 1s infinite; 
        }
        
        .led-empty { background: #333; border: 2px solid #111; box-shadow: none; animation: none; }
        
        @keyframes pulse-led { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .toolbar { 
            background: #111; 
            padding: 10px 20px; 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            border-bottom: 1px solid #222; 
            overflow-x: auto; 
        }
        
        button { 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 10px; 
            cursor: pointer; 
            border: 1px solid var(--gray-border); 
            background: #1a1a1a; 
            color: white; 
            white-space: nowrap; 
        }
        
        .btn-run { background: var(--accent-red); border: none; }
        .btn-clear { color: #888; }
        
        /* Preview Espelhado */
        .preview-area { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000; 
            padding: 10px; 
        }
        
        .square-screen { 
            width: 98%; 
            height: 98%; 
            background: #fff; 
            border: 2px solid var(--accent-red); 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.2);
        }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="sidebar-container" id="sidebar">
    <div class="editor-wrapper">
        <textarea id="code-editor" oninput="saveAuto()" placeholder="Cole seu código HTML aqui..."></textarea>
    </div>
    <div class="toggle-tab" onclick="toggleSidebar()"><span id="toggle-icon">&gt;</span></div>
</div>

<div class="main-container">
    <header>
        <div class="logo">VIZU<span>.PRO</span></div>
        <div class="led-mem" id="led-status" onclick="restaurarDaMemoria()" title="Restaurar Memória"></div>
        <button onclick="baixarHTML()">💾 SALVAR NO CELULAR</button>
    </header>

    <div class="toolbar">
        <button class="btn-run" onclick="rodarPreview()">▶ RODAR</button>
        <button class="btn-clear" onclick="limparTudo()">🗑️ LIMPAR TELA</button>
        <button onclick="document.getElementById('file-input').click()">📁 ABRIR ARQUIVO</button>
    </div>

    <div class="preview-area">
        <div class="square-screen">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>
</div>

<input type="file" id="file-input" accept=".html" style="display:none" onchange="carregarArquivo(event)">

<script>
    const editor = document.getElementById('code-editor');
    const iframe = document.getElementById('preview-frame');
    const led = document.getElementById('led-status');

    // Atualiza o Preview
    function rodarPreview() {
        const conteudo = editor.value;
        const blob = new Blob([conteudo], {type: 'text/html'});
        iframe.src = URL.createObjectURL(blob);
    }

    // Limpa Editor e Preview
    function limparTudo() {
        if(confirm("Deseja limpar todo o código?")) {
            editor.value = '';
            iframe.src = 'about:blank';
            saveAuto();
        }
    }

    // Salva automaticamente no LocalStorage para o LED
    function saveAuto() {
        localStorage.setItem('vizu_last_code', editor.value);
        atualizarStatusLED();
    }

    // Gerencia o LED de Memória
    function atualizarStatusLED() {
        const temCodigo = localStorage.getItem('vizu_last_code');
        if (temCodigo && temCodigo.trim() !== "") {
            led.classList.remove('led-empty');
        } else {
            led.classList.add('led-empty');
        }
    }

    // Restaura o código da memória do navegador
    function restaurarDaMemoria() {
        const salvo = localStorage.getItem('vizu_last_code');
        if (salvo) {
            editor.value = salvo;
            rodarPreview();
            alert("Código restaurado da memória!");
        }
    }

    // Salva o arquivo HTML direto no dispositivo
    function baixarHTML() {
        const blob = new Blob([editor.value], {type: 'text/html'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'projeto_vizu_pro.html';
        link.click();
    }

    // Abre arquivo do celular
    function carregarArquivo(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            editor.value = e.target.result;
            rodarPreview();
            saveAuto();
        };
        reader.readAsText(file);
    }

    // Toggle da Sidebar
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('toggle-icon');
        sidebar.classList.toggle('is-open');
        icon.innerText = sidebar.classList.contains('is-open') ? '<' : '>';
    }

    // Iniciar carregando a última sessão
    window.onload = () => {
        const salvo = localStorage.getItem('vizu_last_code');
        if(salvo) editor.value = salvo;
        atualizarStatusLED();
    };
</script>

</body>
</html>
