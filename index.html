<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vizu.html - Pro Edition</title>
    <style>
        :root {
            --bg-dark: #000000;
            --accent-red: #ff0000;
            --accent-blue: #0084ff;
            --gray-border: #333;
            --sidebar-closed: 40px;
            --sidebar-open: 350px;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #050505; 
            color: white;
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* BARRA LATERAL */
        .sidebar-container { 
            width: var(--sidebar-closed);
            background: #000;
            border-right: 1px solid var(--accent-red);
            display: flex;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 100;
        }

        .sidebar-container.is-open { width: var(--sidebar-open); }

        .editor-wrapper {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }

        .is-open .editor-wrapper { opacity: 1; pointer-events: auto; }

        textarea { 
            flex: 1; border: none; padding: 20px; 
            font-family: 'Consolas', monospace; 
            font-size: 13px; outline: none; resize: none; 
            background: transparent; color: #ff4d4d;
            width: 100%; box-sizing: border-box;
        }

        .toggle-tab {
            width: 40px; height: 100%; background: #0a0a0a;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--accent-red); font-weight: bold;
            transition: 0.3s; border-left: 1px solid #222;
        }

        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        header {
            background: #000; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent-red);
        }

        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--accent-red); text-shadow: 0 0 15px var(--accent-red); }

        .monitor-box {
            background: #111; color: #666; padding: 5px 15px; 
            font-size: 12px; border: 1px solid #222;
        }

        .toolbar {
            background: #111; padding: 10px 20px;
            display: flex; gap: 12px; align-items: center;
            border-bottom: 1px solid #222;
        }

        .btn-group { display: flex; flex-direction: column; gap: 5px; }

        button {
            padding: 8px 15px; border-radius: 6px;
            font-weight: bold; font-size: 11px;
            cursor: pointer; transition: 0.2s;
            border: 1px solid var(--gray-border);
            background: #1a1a1a; color: white;
            white-space: nowrap;
        }

        .btn-run { background: var(--accent-red); border: none; padding: 10px 20px; }
        .btn-save { background: var(--accent-blue); border: none; }
        
        .preview-area {
            flex: 1; display: flex;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            padding: 10px;
        }

        .square-screen {
            width: 98%; height: 98%;
            background: #000;
            border: 2px solid var(--accent-red);
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }

        iframe { width: 100%; height: 100%; border: none; background: #000; }
        #file-input { display: none; }
    </style>
</head>
<body>

<input type="file" id="file-input" accept=".html,.txt,.css" onchange="loadFile(event)">

<div class="sidebar-container" id="sidebar">
    <div class="editor-wrapper">
        <textarea id="code-editor" spellcheck="false" placeholder="Cole o código da câmera aqui..."></textarea>
    </div>
    <div class="toggle-tab" onclick="toggleSidebar()" id="tab-btn">
        <span>&lt;</span>
    </div>
</div>

<div class="main-container">
    <header>
        <div class="logo">VIZU<span>.PRO</span></div>
        <div class="monitor-box" id="status-text">PROCESSADOR STANDBY</div>
    </header>

    <div class="toolbar">
        <div class="btn-group">
            <button class="btn-run" onclick="updatePreview()">▶ RODAR APP</button>
            <button class="btn-save" onclick="downloadFile()">💾 SALVAR INDEX</button>
        </div>
        <div class="btn-group">
            <button onclick="document.getElementById('file-input').click()">📂 ABRIR</button>
            <button style="color: #ffa500;" onclick="clearAll()">🗑️ LIMPAR</button>
        </div>
        <button onclick="copyText()">📋 COPIAR</button>
    </div>

    <div class="preview-area">
        <div class="square-screen" id="screen-container">
            <iframe id="preview-frame" allow="camera *; microphone *; display-capture *; geolocation *; autoplay *" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const tabBtn = document.getElementById('tab-btn');
    const editor = document.getElementById('code-editor');
    const iframe = document.getElementById('preview-frame');
    const status = document.getElementById('status-text');

    // Verifica se estamos em um ambiente seguro para câmera
    window.onload = () => {
        if (location.protocol === 'file:') {
            status.innerText = "AVISO: MODO ARQUIVO (CÂMERA BLOQUEADA PELA SEGURANÇA)";
            status.style.color = "#ffae00";
        }
    };

    function toggleSidebar() {
        const isOpen = sidebar.classList.toggle('is-open');
        tabBtn.querySelector('span').innerText = isOpen ? '>' : '<';
        if(isOpen) setTimeout(() => editor.focus(), 400);
    }

    function updatePreview() {
        const code = editor.value;
        if(!code) return;

        // O segredo para o Iframe tentar aceitar a câmera mesmo em arquivos
        const blob = new Blob([code], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        iframe.src = url;
        
        status.innerText = "SISTEMA EM EXECUÇÃO";
        status.style.color = "#00ff00";
    }

    function downloadFile() {
        if(!editor.value) return alert("Editor vazio!");
        const blob = new Blob([editor.value], {type: "text/html"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "index.html";
        a.click();
    }

    function loadFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            editor.value = e.target.result;
            updatePreview();
            if(!sidebar.classList.contains('is-open')) toggleSidebar();
        };
        reader.readAsText(file);
    }

    function copyText() {
        editor.select();
        document.execCommand('copy');
        status.innerText = "CODE COPIADO";
    }

    function clearAll() {
        if(confirm("Deseja resetar o processador?")) {
            editor.value = "";
            iframe.src = "about:blank";
            status.innerText = "PROCESSADOR STANDBY";
            status.style.color = "#666";
        }
    }

    editor.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') updatePreview();
    });
</script>

</body>
</html>
