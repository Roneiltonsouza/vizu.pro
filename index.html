<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vizu.html - Pro Edition (Fixed & Memory Enhanced)</title>
    <style>
        :root { --accent-red: #ff0000; --accent-blue: #0084ff; --gray-border: #333; --sidebar-closed: 40px; --sidebar-open: 350px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #050505; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Lateral */
        .sidebar-container { width: var(--sidebar-closed); background: #000; border-right: 1px solid var(--accent-red); display: flex; transition: width 0.4s; position: relative; z-index: 100; }
        .sidebar-container.is-open { width: var(--sidebar-open); }
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .is-open .editor-wrapper { opacity: 1; pointer-events: auto; }
        textarea { flex: 1; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 13px; background: transparent; color: #ff4d4d; width: 100%; box-sizing: border-box; outline: none; resize: none; }
        .toggle-tab { width: 40px; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-red); font-weight: bold; border-left: 1px solid #222; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        /* Header com Logo e LED abaixo */
        header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-red); }
        .brand-container { display: flex; flex-direction: column; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--accent-red); }
        
        /* LED Status - Agora com indicação visual de que tem algo na memória */
        .led-mem { width: 25px; height: 25px; border-radius: 50%; background: #00ff00; border: 2px solid #004400; cursor: pointer; box-shadow: 0 0 10px #00ff00; animation: pulse-led 1s infinite; margin-top: 5px; transition: transform 0.2s; }
        .led-empty { background: #333; border: 2px solid #111; box-shadow: none; animation: none; }
        .led-offline { border: 2px solid #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        @keyframes pulse-led { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Toolbar */
        .toolbar { background: #111; padding: 10px 20px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #222; }
        button { padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 10px; cursor: pointer; border: 1px solid var(--gray-border); background: #1a1a1a; color: white; }
        .btn-run { background: var(--accent-red); border: none; }
        
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; padding: 10px; }
        .square-screen { width: 98%; height: 98%; background: #000; border: 2px solid var(--accent-red); border-radius: 8px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Mensagem de Erro Customizada */
        #error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: white; z-index: 10;
        }
        #error-overlay svg { width: 80px; height: 80px; fill: #555; margin-bottom: 20px; }
        #error-overlay h2 { font-size: 18px; margin: 10px 0; }
        #error-overlay p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        #error-overlay button { background: #eee; color: #000; padding: 10px 30px; border-radius: 4px; border: none; font-size: 14px; }
    </style>
</head>
<body>

<input type="file" id="memory-input" accept=".html" style="display:none" onchange="fixarArquivo(event)">

<div class="sidebar-container" id="sidebar">
    <div class="editor-wrapper">
        <textarea id="code-editor" spellcheck="false" placeholder="Digite seu código HTML aqui..." oninput="saveAuto()"></textarea>
    </div>
    <div class="toggle-tab" onclick="toggleSidebar()"><span id="toggle-icon">&lt;</span></div>
</div>

<div class="main-container">
    <header>
        <div class="brand-container">
            <div class="logo">VIZU<span>.PRO</span></div>
            <div class="led-mem" id="led-status" onclick="restaurarDaMemoria()" title="Restaurar da Memória"></div>
        </div>
        <button style="border-color: var(--accent-blue); color: var(--accent-blue);" onclick="salvarLocal()">💾 SALVAR</button>
    </header>

    <div class="toolbar">
        <button class="btn-run" onclick="rodarArquivo()">▶ RODAR</button>
        <button onclick="document.getElementById('memory-input').click()">📁 MEMÓRIA (GALERIA)</button>
        <button style="color: #ffa500;" onclick="limparTela()">🗑️ LIMPAR</button>
    </div>

    <div class="preview-area">
        <div class="square-screen">
            <iframe id="preview-frame"></iframe>
            <div id="error-overlay">
                <svg viewBox="0 0 24 24"><path d="M23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l10.08 12.56c.8 1 2.32 1 3.12 0L23.64 7zm-1.29 1.14L12 21.01 1.65 8.14C2.33 7.62 6.13 4.6 12 4.6c5.87 0 9.67 3.02 10.35 3.54z"/><path d="M0 0h24v24H0V0z" fill="none"/><path d="M4.91 10.96l7.09 8.83 7.09-8.83C18.41 10.43 15.61 8.4 12 8.4s-6.41 2.03-7.09 2.56z" opacity=".3"/></svg>
                <h2>Sem conexão com a internet</h2>
                <p>Verifique sua conexão e tente novamente</p>
                <button onclick="rodarArquivo()">Tentar novamente</button>
            </div>
        </div>
    </div>
</div>

<script>
    const editor = document.getElementById('code-editor');
    const iframe = document.getElementById('preview-frame');
    const led = document.getElementById('led-status');
    const errorOverlay = document.getElementById('error-overlay');

    // Monitorar status da rede e da memória
    function updateStatus() {
        const salvo = localStorage.getItem('index_vizu');
        
        // Status da Memória (LED Verde se tiver algo salvo, Cinza se vazio)
        if (salvo && salvo.trim() !== "") {
            led.classList.remove('led-empty');
            led.title = "Memória Ativa - Clique para Restaurar";
        } else {
            led.classList.add('led-empty');
            led.title = "Memória Vazia";
        }

        // Status da Conexão (Borda Laranja se offline)
        if (!navigator.onLine) {
            led.classList.add('led-offline');
        } else {
            led.classList.remove('led-offline');
        }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    function saveAuto() { 
        localStorage.setItem('index_vizu', editor.value);
        updateStatus();
    }

    function fixarArquivo(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const conteudo = e.target.result;
            editor.value = conteudo;
            localStorage.setItem('index_vizu', conteudo);
            updateStatus();
            rodarArquivo();
        };
        reader.readAsText(file);
    }

    function restaurarDaMemoria() {
        const salvo = localStorage.getItem('index_vizu');
        if (salvo && salvo.trim() !== "") { 
            editor.value = salvo; 
            rodarArquivo(); 
            led.style.transform = "scale(1.2)";
            setTimeout(() => led.style.transform = "scale(1)", 200);
        } else {
            alert("Nenhum código salvo na memória.");
        }
    }

    // ===== FUNÇÃO CORRIGIDA =====
    function rodarArquivo() {
        errorOverlay.style.display = "none";
        
        // VERIFICAÇÃO: Se o editor estiver vazio, limpa o preview e para a execução.
        if (!editor.value.trim()) {
            iframe.src = "about:blank";
            return;
        }

        try {
            const blob = new Blob([editor.value], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            iframe.onload = () => URL.revokeObjectURL(url);
            iframe.src = url;
        } catch (e) {
            console.error("Erro ao rodar arquivo:", e);
            // A sobreposição de erro agora só será exibida se houver um erro REAL
            errorOverlay.style.display = "flex";
        }
    }
    // ============================

    function salvarLocal() {
        if (!editor.value.trim()) return;
        const blob = new Blob([editor.value], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function limparTela() {
        if(confirm("Limpar editor? (Isso não apaga a memória do LED verde)")) {
            editor.value = "";
            iframe.src = "about:blank";
            updateStatus();
        }
    }

    function toggleSidebar() { 
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('toggle-icon');
        sidebar.classList.toggle('is-open'); 
        icon.textContent = sidebar.classList.contains('is-open') ? ">" : "<";
    }
    
    window.onload = () => {
        const salvo = localStorage.getItem('index_vizu');
        if (salvo) { 
            editor.value = salvo; 
            rodarArquivo(); 
        }
        updateStatus();
    };
</script>
</body>
</html>
