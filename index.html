<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vizu.pro - Gerador de Site Pro</title>
    <style>
        :root { --accent-red: #ff4500; --accent-blue: #0084ff; --gray-border: #333; --sidebar-closed: 40px; --sidebar-open: 350px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #050505; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral do Editor */
        .sidebar-container { width: var(--sidebar-closed); background: #000; border-right: 1px solid var(--accent-red); display: flex; transition: width 0.4s; position: relative; z-index: 100; }
        .sidebar-container.is-open { width: var(--sidebar-open); }
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .is-open .editor-wrapper { opacity: 1; pointer-events: auto; }
        textarea { flex: 1; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 13px; background: transparent; color: #ff4d4d; width: 100%; box-sizing: border-box; outline: none; resize: none; }
        .toggle-tab { width: 40px; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-red); font-weight: bold; border-left: 1px solid #222; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        /* Cabeçalho e LED de Memória */
        header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-red); }
        .brand-container { display: flex; flex-direction: column; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--accent-red); }
        
        .led-mem { width: 25px; height: 25px; border-radius: 50%; background: #00ff00; border: 2px solid #004400; cursor: pointer; box-shadow: 0 0 10px #00ff00; animation: pulse-led 1s infinite; margin-top: 5px; }
        .led-empty { background: #333; border: 2px solid #111; box-shadow: none; animation: none; }
        @keyframes pulse-led { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Toolbar de Comandos */
        .toolbar { background: #111; padding: 10px 20px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #222; overflow-x: auto; }
        button { padding: 8px 14px; border-radius: 6px; font-weight: bold; font-size: 10px; cursor: pointer; border: 1px solid var(--gray-border); background: #1a1a1a; color: white; white-space: nowrap; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-run { background: var(--accent-red); border: none; }
        .btn-gerador { border-color: #00ffff; color: #00ffff; }
        
        /* Área de Visualização (Preview) */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; padding: 10px; }
        .square-screen { width: 98%; height: 98%; background: #000; border: 2px solid var(--accent-red); border-radius: 8px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Modal do Gerador Privado */
        #modal-gerador { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .gerador-container { width: 90%; max-width: 500px; background: #0a0a0a; border: 2px solid #ff4500; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 30px rgba(255, 69, 0, 0.5); }
        .gerador-input { width: 100%; background: #111; border: 1px solid #333; color: #00ff00; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .close-modal { float: right; color: #ff4500; font-weight: bold; cursor: pointer; padding: 5px; }

        .g-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .g-tab-btn { flex: 1; background: #1a1a1a; font-size: 10px; padding: 10px; border: 1px solid #333; color: #aaa; border-radius: 8px; cursor: pointer; }
        .g-tab-btn.active { background: #ff4500; color: #fff; border-color: #ff4500; }
        .g-content { display: none; }
        .g-content.active { display: block; }
        .site-item { background: #111; border: 1px solid #333; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #ff4500; }
    </style>
</head>
<body>

<div id="modal-gerador">
    <div class="gerador-container">
        <span class="close-modal" onclick="fecharGerador()">[ FECHAR ]</span>
        <h2 style="color: #ff4500; text-align: center; margin-bottom: 20px;">VIZU GERADOR PRO</h2>
        
        <div id="gerador-login">
            <p style="text-align: center; font-size: 11px; color: #777; letter-spacing: 1px;">ACESSO PROTEGIDO</p>
            <input type="password" id="senha-gerador" class="gerador-input" placeholder="Digite a Senha Mestra">
            <button class="btn-run" onclick="validarSenha()" style="width: 100%; padding: 15px;">ENTRAR NO GERADOR</button>
        </div>

        <div id="gerador-painel" style="display: none;">
            <div class="g-tabs">
                <button class="g-tab-btn active" onclick="gTab('g-novo')">➕ PUBLICAR</button>
                <button class="g-tab-btn" onclick="gTab('g-lista'); listarProjetosVercel();">📂 MEUS SITES</button>
                <button class="g-tab-btn" onclick="gTab('g-config')">⚙️ TOKEN</button>
            </div>

            <div id="g-novo" class="g-content active">
                <label style="font-size: 10px; color: #ff4500; font-weight: bold;">NOME DO PROJETO</label>
                <input type="text" id="g-nome" class="gerador-input" placeholder="ex: meu-site-blindado">
                <button class="btn-run" id="g-btn-main" style="width: 100%; padding: 15px;" onclick="fazerDeployVercel()">🚀 ENVIAR PARA VERCEL</button>
                <div id="g-status" style="margin-top: 15px; text-align: center; font-size: 12px;"></div>
            </div>

            <div id="g-lista" class="g-content">
                <div id="g-lista-sites">Sincronizando com a nuvem...</div>
            </div>

            <div id="g-config" class="g-content">
                <p style="font-size: 11px; color: #888;">Gerencie sua chave de acesso Vercel com segurança.</p>
                <button class="btn-run" style="background:#444" onclick="resetarChave()">🗑️ APAGAR TOKEN SALVO</button>
            </div>
        </div>
    </div>
</div>

<div class="sidebar-container" id="sidebar">
    <div class="editor-wrapper">
        <textarea id="code-editor" spellcheck="false" placeholder="Escreva seu código HTML aqui..." oninput="saveAuto()"></textarea>
    </div>
    <div class="toggle-tab" onclick="toggleSidebar()"><span id="toggle-icon">&lt;</span></div>
</div>

<div class="main-container">
    <header>
        <div class="brand-container">
            <div class="logo">VIZU<span>.PRO</span></div>
            <div class="led-mem" id="led-status" onclick="restaurarDaMemoria()" title="Clique para Restaurar"></div>
        </div>
        <button style="border-color: var(--accent-blue); color: var(--accent-blue);" onclick="salvarLocal()">💾 SALVAR NO CELULAR</button>
    </header>

    <div class="toolbar">
        <button class="btn-run" onclick="rodarArquivo()">▶ RODAR</button>
        <button class="btn-gerador" onclick="abrirGerador()">🌐 GERADOR SITE</button>
        <button onclick="document.getElementById('memory-input').click()">📁 GALERIA</button>
        <button style="color: #ffa500; border-color: #ffa500;" onclick="limparTela()">🗑️ LIMPAR</button>
    </div>

    <div class="preview-area">
        <div class="square-screen">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>
</div>

<input type="file" id="memory-input" accept=".html" style="display:none" onchange="fixarArquivo(event)">

<script>
    const editor = document.getElementById('code-editor');
    const iframe = document.getElementById('preview-frame');
    const led = document.getElementById('led-status');

    // === COFRE DE SEGURANÇA (TOKEN VERCEL) ===
    function obterToken() {
        let token = localStorage.getItem('vercel_token_blindado');
        if (!token) {
            token = prompt("🔐 SEGURANÇA: Digite seu Token da Vercel (Ficará salvo apenas neste dispositivo):");
            if (token) localStorage.setItem('vercel_token_blindado', token);
        }
        return token;
    }

    function resetarChave() {
        if(confirm("Deseja apagar a chave salva? Você precisará digitar uma nova no próximo deploy.")) {
            localStorage.removeItem('vercel_token_blindado');
            alert("Token removido!");
        }
    }

    // === FUNÇÕES DO GERADOR ===
    function abrirGerador() { document.getElementById('modal-gerador').style.display = 'flex'; }
    function fecharGerador() { document.getElementById('modal-gerador').style.display = 'none'; }

    function validarSenha() {
        if(document.getElementById('senha-gerador').value === "Rdg@vizusite") {
            document.getElementById('gerador-login').style.display = 'none';
            document.getElementById('gerador-painel').style.display = 'block';
        } else { alert("Senha Incorreta!"); }
    }

    function gTab(id) {
        document.querySelectorAll('.g-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.g-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    async function fazerDeployVercel() {
        const token = obterToken();
        if(!token) return;

        const nome = document.getElementById('g-nome').value.trim().toLowerCase().replace(/\s+/g, '-');
        const codigo = editor.value; 
        const status = document.getElementById('g-status');

        if(!nome || !codigo) return alert("Erro: Editor vazio ou nome não definido.");

        status.innerHTML = "⚡ Publicando na nuvem...";
        try {
            const res = await fetch('https://api.vercel.com/v13/deployments', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nome, files: [{ file: 'index.html', data: codigo }] })
            });
            const data = await res.json();
            if(data.url) status.innerHTML = `<span style="color:#00ff00">✅ SUCESSO!</span><br><a href="https://${data.url}" target="_blank" style="color:#00ffff">${data.url}</a>`;
            else status.innerHTML = "❌ Erro: Verifique seu Token.";
        } catch (e) { status.innerHTML = "❌ Falha na conexão."; }
    }

    async function listarProjetosVercel() {
        const token = obterToken();
        if(!token) return;

        const lista = document.getElementById('g-lista-sites');
        lista.innerHTML = "Buscando sites...";
        try {
            const res = await fetch('https://api.vercel.com/v9/projects', { headers: { 'Authorization': `Bearer ${token}` }});
            const data = await res.json();
            lista.innerHTML = "";
            if(data.projects.length === 0) lista.innerHTML = "Nenhum site encontrado.";
            data.projects.forEach(p => {
                lista.innerHTML += `<div class="site-item"><b>${p.name.toUpperCase()}</b><br>
                <button onclick="document.getElementById('g-nome').value='${p.name}'; gTab('g-novo');" style="margin-top:5px;">📝 ATUALIZAR</button></div>`;
            });
        } catch (e) { lista.innerHTML = "Erro ao sincronizar."; }
    }

    // === FUNÇÕES DO EDITOR ===
    function limparTela() {
        if(confirm("Deseja limpar o editor?")) {
            editor.value = ""; 
            iframe.src = "about:blank"; 
            updateStatus(); 
        }
    }

    function rodarArquivo() {
        const blob = new Blob([editor.value], {type: 'text/html'});
        iframe.src = URL.createObjectURL(blob);
    }

    function saveAuto() { localStorage.setItem('index_vizu', editor.value); updateStatus(); }

    function updateStatus() {
        const salvo = localStorage.getItem('index_vizu');
        if (salvo && salvo.trim() !== "") led.classList.remove('led-empty');
        else led.classList.add('led-empty');
    }

    function restaurarDaMemoria() {
        const salvo = localStorage.getItem('index_vizu');
        if (salvo) { editor.value = salvo; rodarArquivo(); }
    }

    function fixarArquivo(event) {
        const reader = new FileReader();
        reader.onload = e => { editor.value = e.target.result; saveAuto(); rodarArquivo(); };
        reader.readAsText(event.target.files[0]);
    }

    function salvarLocal() {
        const blob = new Blob([editor.value], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }

    function toggleSidebar() { 
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('is-open'); 
        document.getElementById('toggle-icon').textContent = sidebar.classList.contains('is-open') ? ">" : "<";
    }

    window.onload = () => {
        const salvo = localStorage.getItem('index_vizu');
        if(salvo) { editor.value = salvo; rodarArquivo(); }
        updateStatus();
    };
</script>
</body>
</html>
